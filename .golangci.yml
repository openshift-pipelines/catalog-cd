version: "2"
run:
  modules-download-mode: vendor
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    #- containedctx
    #- contextcheck
    #- cyclop
    - decorder
    #- depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    #- exhaustruct
    - forbidigo
    - forcetypeassert
    #- funlen
    #- gci
    - ginkgolinter
    - gocheckcompilerdirectives
    #- gochecknoglobals
    - gochecknoinits
    #- gochecksumtype
    #- gocognit
    #- goconst
    - gocritic
    #- gocyclo
    - godot
    #- godox
    #- err113
    - goheader
    #- mnd
    #- gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    #- gosmopolitan
    - grouper
    - importas
    #- inamedparam
    #- interfacebloat
    #- ireturn
    #- lll
    - loggercheck
    #- maintidx
    - makezero
    #- mirror
    - misspell
    #- musttag
    - nakedret
    #- nestif
    - nilerr
    #- nilnil
    #- nlreturn
    - noctx
    #- nolintlint
    #- nonamedreturns
    - nosprintfhostport
    #- paralleltest
    #- perfsprint
    #- prealloc
    - predeclared
    - promlinter
    #- protogetter
    - reassign
    - revive
    #- rowserrcheck
    #- sloglint
    #- sqlclosecheck
    #- tagalign
    #- tagliatelle
    - testableexamples
    #- testifylint
    #- testpackage
    #- thelper
    - tparallel
    #- unconvert
    - unparam
    - usestdlibvars
    #- varnamelen
    #- wastedassign
    - whitespace
    #- wrapcheck
    #- wsl
    #- zerologlint
  settings:
    gocritic:
      disabled-checks:
        - unlambda
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G115
  exclusions:
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
      - linters:
          - errcheck
        source: "\\.Close\\(\\)"
      - linters:
          - errcheck
        source: "os\\.RemoveAll\\("
    paths:
      - vendor
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    paths:
      - vendor
